name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  app:
    name: Typecheck & lint (Next.js)
    runs-on: ubuntu-latest
    # Skips gracefully until the Next.js app is scaffolded
    if: ${{ hashFiles('package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  pdf-worker:
    name: Lint Python PDF worker
    runs-on: ubuntu-latest
    if: ${{ hashFiles('pdf-worker/**/*.py') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check pdf-worker/
