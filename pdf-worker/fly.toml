# Fly.io configuration for the masa-cv-builder PDF worker.
# Edit `app` to your unique app name before `fly launch --no-deploy`.

app = "masa-cv-pdf"
primary_region = "fra"   # Frankfurt — close to Israel-based users

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"      # cold-start on demand keeps cost ~$0
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512   # Chromium needs the headroom
